<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Your Average Events</title>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <div class="container">
        <h1>Welcome to Not Your Average Events</h1>
        
        <!-- Controls Section -->
        <div class="controls">
            <!-- Search and Filter -->
            <div class="search-filter-section">
                <input type="text" id="searchInput" placeholder="Search events by title or date...">
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="Meetup">Meetup</option>
                    <option value="Workshop">Workshop</option>
                    <option value="Conference">Conference</option>
                </select>
            </div>
            
            <!-- Add Event Button -->
            <button id="addEventBtn" class="btn-primary">Add New Event</button>
        </div>

        <!-- Event Creation Form (Hidden by default) -->
        <div id="eventForm" class="event-form hidden">
            <h3>Add New Event</h3>
            <form id="newEventForm">
                <input type="text" id="eventTitle" placeholder="Event Title" required>
                <input type="date" id="eventDate" required>
                <input type="time" id="eventTime" placeholder="Time">
                <input type="text" id="eventLocation" placeholder="Location">
                <select id="eventCategory" required>
                    <option value="">Select Category</option>
                    <option value="Meetup">Meetup</option>
                    <option value="Workshop">Workshop</option>
                    <option value="Conference">Conference</option>
                </select>
                <textarea id="eventDescription" placeholder="Event Description" required></textarea>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Add Event</button>
                    <button type="button" id="cancelEventBtn" class="btn-secondary">Cancel</button>
                </div>
            </form>
        </div>

        <!-- Events Calendar -->
        <div id="calendar"></div>
    </div>

    <!-- Event Details Modal -->
    <div id="eventModal" class="modal hidden">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="src/app.js"></script>
</body>
</html>
