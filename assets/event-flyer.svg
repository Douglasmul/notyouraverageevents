<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8bc34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4caf50;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#grad1)"/>
  
  <!-- Decorative elements -->
  <circle cx="550" cy="50" r="30" fill="rgba(255,255,255,0.1)"/>
  <circle cx="50" cy="350" r="40" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Main content area -->
  <rect x="40" y="40" width="520" height="320" fill="rgba(0,0,0,0.8)" rx="15"/>
  
  <!-- Title -->
  <text x="300" y="100" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="32" font-weight="bold">🎉 Latest Event</text>
  
  <!-- Event details -->
  <text x="300" y="140" text-anchor="middle" fill="#8bc34a" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Featured Event Showcase</text>
  
  <!-- Description -->
  <text x="300" y="180" text-anchor="middle" fill="#ccc" font-family="Arial, sans-serif" font-size="14">Join us for an amazing experience!</text>
  <text x="300" y="200" text-anchor="middle" fill="#ccc" font-family="Arial, sans-serif" font-size="14">Connect with like-minded people in your community</text>
  
  <!-- Date and time -->
  <rect x="80" y="230" width="200" height="60" fill="rgba(139,195,74,0.2)" rx="8"/>
  <text x="90" y="250" fill="#8bc34a" font-family="Arial, sans-serif" font-size="12" font-weight="bold">DATE & TIME</text>
  <text x="90" y="270" fill="#fff" font-family="Arial, sans-serif" font-size="14">Coming Soon</text>
  
  <!-- Location -->
  <rect x="320" y="230" width="200" height="60" fill="rgba(139,195,74,0.2)" rx="8"/>
  <text x="330" y="250" fill="#8bc34a" font-family="Arial, sans-serif" font-size="12" font-weight="bold">LOCATION</text>
  <text x="330" y="270" fill="#fff" font-family="Arial, sans-serif" font-size="14">Amazing Venue</text>
  
  <!-- Footer -->
  <text x="300" y="330" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="12">Not Your Average Events</text>
</svg>
