<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="cannabisPattern" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="rgba(139, 195, 74, 0.05)"/>
      <text x="25" y="30" text-anchor="middle" font-size="20" fill="rgba(139, 195, 74, 0.1)">🌿</text>
    </pattern>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d3f2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bgGrad)"/>
  <rect width="400" height="300" fill="url(#cannabisPattern)"/>
  
  <!-- Glowing accents -->
  <circle cx="50" cy="50" r="20" fill="rgba(139, 195, 74, 0.2)"/>
  <circle cx="350" cy="80" r="15" fill="rgba(76, 175, 80, 0.15)"/>
  <circle cx="100" cy="250" r="25" fill="rgba(255, 193, 7, 0.1)"/>
  <circle cx="300" cy="220" r="18" fill="rgba(255, 152, 0, 0.1)"/>
</svg>